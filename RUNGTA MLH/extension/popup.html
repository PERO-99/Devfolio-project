<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VERITAS X</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050a14;
        --panel: rgba(9, 15, 28, 0.95);
        --border: rgba(148, 163, 184, 0.2);
        --text: #e5e7eb;
        --muted: #94a3b8;
        --safe: #34d399;
        --sus: #fbbf24;
        --danger: #f87171;
      }
      body {
        margin: 0;
        min-width: 340px;
        background: radial-gradient(circle at top right, rgba(37,99,235,0.22), transparent 42%), radial-gradient(circle at bottom left, rgba(239,68,68,0.12), transparent 44%), var(--bg);
        color: var(--text);
        font: 13px/1.4 system-ui, sans-serif;
      }
      .wrap { padding: 14px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 18px 45px rgba(0,0,0,0.4);
        animation: popupIn .28s ease;
      }
      @keyframes popupIn {
        from { opacity: 0; transform: translateY(8px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .titleRow { display:flex; align-items:center; justify-content:space-between; gap:8px; }
      .title { font-size: 14px; font-weight: 700; margin: 0; }
      .live {
        display:inline-flex;
        align-items:center;
        gap:6px;
        font-size:11px;
        padding:4px 8px;
        border-radius:999px;
        border:1px solid rgba(56,189,248,0.45);
        color:#7dd3fc;
        background:rgba(56,189,248,0.08);
      }
      .dot {
        width:7px;
        height:7px;
        border-radius:999px;
        background:#22d3ee;
        box-shadow:0 0 0 0 rgba(34,211,238,0.6);
        animation:pulse 1.8s infinite;
      }
      @keyframes pulse {
        0% { box-shadow:0 0 0 0 rgba(34,211,238,0.5); }
        70% { box-shadow:0 0 0 10px rgba(34,211,238,0); }
        100% { box-shadow:0 0 0 0 rgba(34,211,238,0); }
      }
      .muted { color: var(--muted); font-size: 12px; }
      .row { display: flex; gap: 8px; margin-top: 10px; }
      button {
        border: 1px solid var(--border);
        background: rgba(17, 24, 39, 0.92);
        color: var(--text);
        padding: 9px 10px;
        border-radius: 12px;
        cursor: pointer;
        flex: 1;
        font-weight: 600;
        transition: transform .14s ease, border-color .2s ease, background .2s ease;
      }
      button:hover { border-color: rgba(56,189,248,0.58); background: rgba(30,41,59,0.95); transform: translateY(-1px); }
      button:active { transform: translateY(0); }
      .btn-primary {
        background: linear-gradient(135deg, rgba(37,99,235,0.42), rgba(147,51,234,0.38));
        border-color: rgba(99,102,241,0.55);
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        margin-top: 10px;
      }
      .safe { background: rgba(52, 211, 153, 0.12); color: var(--safe); }
      .suspicious { background: rgba(251, 191, 36, 0.12); color: var(--sus); }
      .danger { background: rgba(248, 113, 113, 0.12); color: var(--danger); }
      .score { font-size: 28px; font-weight: 800; margin-top: 6px; letter-spacing: -0.04em; }
      .bar {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid rgba(148,163,184,0.25);
        background: rgba(51,65,85,0.55);
      }
      .barFill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #34d399, #fbbf24, #f87171);
        transition: width .45s ease;
      }
      .explanation { margin-top: 8px; color: #cbd5e1; }
      .signals { margin: 10px 0 0; padding-left: 18px; color: #cbd5e1; font-size: 12px; }
      .footer { margin-top: 10px; color: var(--muted); font-size: 11px; display: flex; justify-content: space-between; gap: 10px; }
      .divider { height: 1px; background: rgba(148,163,184,0.16); margin: 12px 0; }
      .loading {
        opacity: 0.8;
        filter: saturate(0.85);
      }
      .danger-glow {
        box-shadow: 0 0 0 1px rgba(248,113,113,0.32), 0 0 36px rgba(248,113,113,0.2), 0 18px 45px rgba(0,0,0,0.45);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card" id="card">
        <div class="titleRow">
          <p class="title">VERITAS X</p>
          <span class="live"><span class="dot"></span>LIVE</span>
        </div>
        <div class="muted" id="pageUrl">No page loaded</div>
        <div class="status suspicious" id="statusPill">Waiting</div>
        <div class="score" id="score">--</div>
        <div class="bar"><div class="barFill" id="scoreBar"></div></div>
        <div class="muted" id="confidence">Confidence --</div>
        <div class="explanation" id="explanation">No result yet.</div>
        <ul class="signals" id="signals"></ul>
        <div class="divider"></div>
        <div class="row">
          <button class="btn-primary" id="scanPage">Scan Page</button>
          <button id="scanSelection">Scan Selection</button>
        </div>
        <div class="row">
          <button id="captureArea">Capture Area</button>
          <button id="refreshResult">Refresh</button>
        </div>
        <div class="footer">
          <span id="timestamp">--</span>
          <span id="source">local</span>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
